<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontakt | PixelForge</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-body p-5">
                        <h2 class="text-center mb-4">Kontaktiraj nas</h2>
                        <form>
                            <div class="mb-3">
                                <label class="form-label">Ime i prezime</label>
                                <input type="text" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Email adresa</label>
                                <input type="email" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Poruka ili link na portfolio</label>
                                <textarea class="form-control" rows="4"></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Pošalji prijavu</button>
                        </form>
                        <div class="mt-4 text-center">
                            <a href="index.html" class="text-decoration-none">&larr; Povratak na početnu</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
